name: C++ CI

on:
  push:
    branches: [ "main", "lib" ]
  pull_request:
    branches: [ "main", "lib" ]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy clang-tools
          sudo apt-get install -y build-essential libgl1-mesa-dev libx11-dev zlib1g-dev
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev

      - name: Check format and tidy
        run: mkdir build && cd build && cmake .. && cd .. && make format
        working-directory: ${{ github.workspace }}

  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libx11-dev zlib1g-dev
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev

      - name: Release
        run: make release
        working-directory: ${{ github.workspace }}

      - name: Tests
        run: make tests
        working-directory: ${{ github.workspace }}

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build with make
        run: make release
        working-directory: ${{ github.workspace }}
